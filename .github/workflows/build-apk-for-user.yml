name: Build APK for User

on:
  push:
    branches:
      - 'trae/solo-agent-Fk46su'
  workflow_dispatch:
    inputs:
      branch:
        description: '要构建的分支'
        required: true
        default: 'trae/solo-agent-Fk46su'
      release_tag:
        description: 'Release 标签 (留空则不上传到 Release)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Determine branch
        id: branch
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.branch.outputs.branch }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Clear 18PlusList.txt
        run: |
          echo "清空18PlusList.txt"
          echo "" > $GITHUB_WORKSPACE/app/src/main/assets/18PlusList.txt

      - name: Remove Aliyun mirrors (unreliable in CI)
        run: |
          sed -i.bak '/maven\.aliyun\.com/d' settings.gradle
          echo "settings.gradle after removing aliyun mirrors:"
          head -45 settings.gradle

      - name: Configure Gradle to use CI JDK (disable auto-download toolchains)
        run: |
          echo "org.gradle.java.installations.auto-download=false" >> gradle.properties
          echo "org.gradle.java.installations.auto-detect=true" >> gradle.properties
          JAVA_HOME_VAL=$(java -XshowSettings:properties -version 2>&1 | grep "java.home" | head -1 | awk '{print $3}')
          echo "Detected java.home: $JAVA_HOME_VAL"

      - name: Switch Gradle wrapper to official distribution (aliyun mirror unreachable in CI)
        run: |
          sed -i 's|https\\://mirrors.aliyun.com/macports/distfiles/gradle/|https\\://services.gradle.org/distributions/|' gradle/wrapper/gradle-wrapper.properties
          echo "gradle-wrapper.properties:"
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          set -o pipefail
          ./gradlew assembleAppDebug --stacktrace --no-daemon --no-configuration-cache --refresh-dependencies 2>&1 | tee build_output.txt
        env:
          COMMIT_NUMBER: ${{ github.run_number }}
          APP_VERSION_NAME: debug-${{ github.run_number }}

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs-${{ github.run_number }}
          path: build_output.txt

      - name: Check Build Output
        run: |
          echo "=== 检查 APK 输出目录 ==="
          OUTPUTS_DIR="$GITHUB_WORKSPACE/app/build/outputs/apk"
          echo "搜索范围: $OUTPUTS_DIR"
          find "$OUTPUTS_DIR" -name "*.apk" 2>/dev/null || echo "APK 目录不存在"
          
          APK_FILE=$(find "$OUTPUTS_DIR" -name "*.apk" -print -quit 2>/dev/null)
          
          if [ -n "$APK_FILE" ]; then
            echo "✅ 找到 APK: $APK_FILE"
            ls -la $(dirname "$APK_FILE")
          else
            echo "❌ 未找到 APK 文件"
            echo ""
            echo "=== 所有输出目录 ==="
            ls -la "$GITHUB_WORKSPACE/app/build/outputs/" 2>/dev/null || echo "outputs 目录不存在"
            echo ""
            echo "=== 构建日志最后 100 行 ==="
            tail -100 build_output.txt
            exit 1
          fi

      - name: Rename APK Files
        run: |
          APK_DIR=$(find "$GITHUB_WORKSPACE/app/build/outputs/apk" -name "*.apk" -print0 2>/dev/null | xargs -0 -n1 dirname 2>/dev/null | head -1)
          echo "APK 目录: $APK_DIR"
          cd "$APK_DIR"
          for f in *.apk; do
            mv "$f" "legado-debug-${GITHUB_RUN_NUMBER}-${f}"
          done
          ls -la

      - name: Create ZIP Archive
        run: |
          APK_DIR=$(find "$GITHUB_WORKSPACE/app/build/outputs/apk" -name "*.apk" -print0 2>/dev/null | xargs -0 -n1 dirname 2>/dev/null | head -1)
          ZIP_NAME="legado-debug-apks-${GITHUB_RUN_NUMBER}.zip"
          cd "$APK_DIR"
          zip "$GITHUB_WORKSPACE/$ZIP_NAME" *.apk
          echo "ZIP 文件已创建: $ZIP_NAME"
          ls -la "$GITHUB_WORKSPACE/$ZIP_NAME"

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: legado-apks-${{ github.run_number }}
          path: app/build/outputs/apk/**/*.apk

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado-apks-zip-${{ github.run_number }}
          path: legado-debug-apks-*.zip

      - name: Create Release and Upload
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Legado Debug Build ${{ github.event.inputs.release_tag }}
          body: |
            自动构建的 Debug 版本
            - 分支: ${{ steps.branch.outputs.branch }}
            - 构建号: ${{ github.run_number }}
          prerelease: false
          files: |
            app/build/outputs/apk/**/*.apk
            legado-debug-apks-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Auto Release on Push
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-build-${{ github.run_number }}
          name: Debug Build #${{ github.run_number }}
          body: |
            ## 自动构建的 Debug 版本
            - 分支: ${{ steps.branch.outputs.branch }}
            - 构建号: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
          prerelease: false
          files: |
            app/build/outputs/apk/**/*.apk
            legado-debug-apks-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
